name: 🤖 Issue Automation

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  auto-label-and-triage:
    name: 🏷️ Label & Triage
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------
      # 1. 检出仓库
      # ---------------------------------------------------------------
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. 解析 Issue Form → 确定 component
      # ---------------------------------------------------------------
      - name: 🔍 解析 Issue Form
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';

            // Issue Form 渲染后，dropdown 字段以 "### Label\n\nValue" 形式出现
            // 匹配 "### Component" 段落的值
            const componentMatch = body.match(/###\s*Component\s*\n\n(.+)/i);
            let component = '';
            if (componentMatch) {
              component = componentMatch[1].trim();
            }

            console.log(`Parsed component: "${component}"`);

            // 映射 dropdown 值 → 标签名
            const labelMap = {
              'copilot-shell (cosh)': 'component:cosh',
              'agent-sec-core': 'component:sec-core',
              'os-skills': 'component:skill',
              'agentsight': 'component:sight'
            };

            const label = labelMap[component] || '';
            console.log(`Mapped label: "${label}"`);

            core.setOutput('component', component);
            core.setOutput('label', label);

      # ---------------------------------------------------------------
      # 3. 打标签
      # ---------------------------------------------------------------
      - name: 🏷️ 打 component 标签
        if: steps.parse.outputs.label != ''
        uses: actions/github-script@v7
        with:
          script: |
            const label = '${{ steps.parse.outputs.label }}';
            console.log(`Applying label: ${label}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });

      # ---------------------------------------------------------------
      # 4. 安装 yq
      # ---------------------------------------------------------------
      - name: 🔧 安装 yq
        if: steps.parse.outputs.label != ''
        run: |
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      # ---------------------------------------------------------------
      # 5. 读取 maintainers.yml → 查找维护者
      # ---------------------------------------------------------------
      - name: 👤 解析维护者
        if: steps.parse.outputs.label != ''
        id: config
        run: |
          LABEL="${{ steps.parse.outputs.label }}"
          echo "🏷️ 标签: $LABEL"

          MAINTAINERS=$(yq -r \
            ".scopes[] | select(.label == \"$LABEL\") | .maintainers[].github" \
            .github/maintainers.yml 2>/dev/null | tr '\n' ',' | sed 's/,$//')

          if [ -z "$MAINTAINERS" ]; then
            echo "⚠️ 未匹配，使用默认维护者"
            MAINTAINERS=$(yq -r \
              ".default.maintainers[].github" \
              .github/maintainers.yml 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          fi

          echo "👤 维护者: $MAINTAINERS"
          echo "maintainers=$MAINTAINERS" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 6. Assign 维护者 + Comment
      # ---------------------------------------------------------------
      - name: 📌 分配维护者
        if: steps.config.outputs.maintainers != ''
        uses: actions/github-script@v7
        with:
          script: |
            const maintainers = '${{ steps.config.outputs.maintainers }}'
              .split(',').map(s => s.trim()).filter(Boolean);

            if (maintainers.length === 0) return;

            console.log(`Assigning: ${maintainers.join(', ')}`);

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: maintainers
            });

            const mentionList = maintainers.map(m => `@${m}`).join(' ');
            const label = '${{ steps.parse.outputs.label }}';
            const scopeName = label.replace('component:', '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## 🔀 Issue Triage`,
                ``,
                `This issue has been automatically assigned to **${mentionList}** ` +
                `as the maintainer(s) of \`${scopeName}\`.`,
                ``,
                `> Maintainers, please review and triage this issue. ` +
                `Set a priority label and update the status as needed. Thanks! 🙏`
              ].join('\n')
            });

      # ---------------------------------------------------------------
      # 7. 邮件通知（可选）
      # ---------------------------------------------------------------
      - name: 📧 检查邮件配置
        if: steps.config.outputs.maintainers != ''
        id: mail-check
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
        run: |
          if [ -z "$MAIL_TO" ] || [ -z "$MAIL_SERVER" ]; then
            echo "⏭️ 邮件 Secrets 未配置，跳过"
          else
            echo "mail_configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 📧 发送邮件
        if: steps.mail-check.outputs.mail_configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🆕 [${{ steps.parse.outputs.label }}] Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          to: ${{ secrets.MAIL_TO }}
          from: "ANOLISA Bot <${{ secrets.MAIL_USERNAME }}>"
          body: |
            # 新 Issue 通知

            **仓库**: ${{ github.repository }}
            **Issue**: #${{ github.event.issue.number }}
            **标题**: ${{ github.event.issue.title }}
            **标签**: ${{ steps.parse.outputs.label }}
            **分配给**: ${{ steps.config.outputs.maintainers }}
            **提交者**: ${{ github.event.issue.user.login }}

            ---

            **链接**: ${{ github.event.issue.html_url }}

            ---

            > 此邮件由 ANOLISA Issue Triage Bot 自动发送。
          convert_markdown: true

      # ---------------------------------------------------------------
      # 8. 钉钉通知（可选）
      # ---------------------------------------------------------------
      - name: 🔔 发送钉钉通知
        if: steps.config.outputs.maintainers != ''
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ] || [ -z "$DINGTALK_SECRET" ]; then
            echo "⏭️ 钉钉未配置，跳过"
            exit 0
          fi

          # ---- 计算加签签名 ----
          TIMESTAMP=$(date +%s%3N)
          STRING_TO_SIGN="${TIMESTAMP}\n${DINGTALK_SECRET}"
          SIGN=$(echo -ne "$STRING_TO_SIGN" \
            | openssl dgst -sha256 -hmac "$DINGTALK_SECRET" -binary \
            | base64)
          ENCODED_SIGN=$(python3 -c "import urllib.parse; print(urllib.parse.quote_plus('$SIGN'))")

          WEBHOOK_URL="${DINGTALK_WEBHOOK}&timestamp=${TIMESTAMP}&sign=${ENCODED_SIGN}"

          # ---- 发送 ----
          LABEL="${{ steps.parse.outputs.label }}"
          SCOPE_NAME="${LABEL#component:}"

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "msgtype": "markdown",
            "markdown": {
              "title": "🆕 新 Issue #${{ github.event.issue.number }}",
              "text": "## 🆕 ANOLISA 新 Issue 通知\n\n**Issue**: [#${{ github.event.issue.number }} ${{ github.event.issue.title }}](${{ github.event.issue.html_url }})\n\n**组件**: \`${SCOPE_NAME}\`\n\n**提交者**: ${{ github.event.issue.user.login }}\n\n**已分配给**: ${{ steps.config.outputs.maintainers }}\n\n---\n\n> 🤖 由 ANOLISA Issue Triage Bot 自动发送"
            }
          }
          EOF

          echo "✅ 钉钉通知已发送"
