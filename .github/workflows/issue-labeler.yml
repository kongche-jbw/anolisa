###############################################################################
# ANOLISA Issue 自动标签 — GitHub Actions Workflow
#
# 功能：
#   当用户通过 Issue Form 模板提交 Issue 时，自动根据 component 下拉选项
#   打上对应的 component:xxx 标签。
#
# 依赖：
#   - stefanbuck/github-issue-parser: 解析 Issue Form 为 JSON
#   - redhat-plumbers-in-action/advanced-issue-labeler: 根据 JSON 打标签
#   - .github/advanced-issue-labeler.yml: 标签映射配置
#
# 支持的模板：
#   - bug_report.yml (Bug Report)
#   - feature_request.yml (Feature Request)
#   - question.yml (Question)
###############################################################################

name: 🏷️ Issue Auto-Labeler

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  label-from-bug-report:
    name: 🐛 Label Bug Report
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'bug(')
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@v3
        id: parser
        with:
          template-path: .github/ISSUE_TEMPLATE/bug_report.yml

      - name: Apply component label
        uses: redhat-plumbers-in-action/advanced-issue-labeler@v3
        with:
          issue-form: ${{ steps.parser.outputs.jsonString }}
          section: component
          block-list: |
            Other / Multiple
          token: ${{ secrets.GITHUB_TOKEN }}

  label-from-feature-request:
    name: ✨ Label Feature Request
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'feat(')
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@v3
        id: parser
        with:
          template-path: .github/ISSUE_TEMPLATE/feature_request.yml

      - name: Apply component label
        uses: redhat-plumbers-in-action/advanced-issue-labeler@v3
        with:
          issue-form: ${{ steps.parser.outputs.jsonString }}
          section: component
          block-list: |
            Other / Multiple
          token: ${{ secrets.GITHUB_TOKEN }}

  label-from-question:
    name: ❓ Label Question
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'docs:')
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@v3
        id: parser
        with:
          template-path: .github/ISSUE_TEMPLATE/question.yml

      - name: Apply component label
        if: ${{ steps.parser.outputs.jsonString != '' }}
        uses: redhat-plumbers-in-action/advanced-issue-labeler@v3
        with:
          issue-form: ${{ steps.parser.outputs.jsonString }}
          section: component
          block-list: |
            General / Multiple
          token: ${{ secrets.GITHUB_TOKEN }}
